# ClusterSecretStore: Bitwarden Secrets Manager
# ------------------------------------------------------------------------------
# Cluster-scoped store — shared by all apps across all namespaces.
# Requires these to exist first:
#   1. bitwarden-access-token secret in external-secrets namespace (bootstrap step)
#   2. bitwarden-sdk-server-tls cert in external-secrets namespace (bitwarden-sdk-tls.yaml)
#
# organizationID and projectID:
#   Log into Bitwarden Secrets Manager → copy your organisation ID from Settings.
#   projectID is the ID of the project you created (e.g. "karamjit-k8s-lab").
#   Each ClusterSecretStore is scoped to ONE project.
#   If you add apps with different projects, create an additional store per project.
# ------------------------------------------------------------------------------
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: bitwarden-secretsmanager
spec:
  provider:
    bitwardensecretsmanager:
      apiURL: https://api.bitwarden.com
      identityURL: https://identity.bitwarden.com
      bitwardenServerSDKURL: https://bitwarden-sdk-server.external-secrets.svc.cluster.local:9998
      # CA bundle for the self-signed SDK server TLS cert.
      # After applying bitwarden-sdk-tls.yaml, extract the CA with:
      #   kubectl -n external-secrets get secret bitwarden-tls-certs \
      #     -o jsonpath='{.data.ca\.crt}'
      # Then paste the base64 value below.
      caBundle: %
      organizationID: ae230c97-442e-4aa2-9521-b4320002cfac
      projectID: c08e5f96-3ec6-4a57-a29b-b4320003322c
      auth:
        secretRef:
          credentials:
            namespace: external-secrets
            name: bitwarden-access-token
            key: token
