    <body>
      <main class="wrap">
        <header class="header">
          <div class="brand">
            <div class="logo">⎈</div>
            <div>
              <h1>K8s Reflection Board</h1>
              <p>k8s.karamjitbrar.com · personal cloud-native lab</p>
            </div>
          </div>
          <nav class="nav">
            <a href="https://github.com/brar-karamjit/devops_tools" target="_blank" rel="noopener">DevOps Repo</a>
            <a href="https://karamjitbrar.com" target="_blank" rel="noopener">Portfolio</a>
            <a href="https://k8s.karamjitbrar.com" target="_blank" rel="noopener">Home</a>
          </nav>
        </header>

        <section class="hero">
          <h2>From Git Commit to Live Traffic</h2>
          <p>This cluster is built to show production-like platform habits on a personal stack: GitOps first, mesh-aware traffic, secure ingress, and observable workloads.</p>
          <div class="chips">
            <span class="chip">OCI ARM</span>
            <span class="chip">ArgoCD</span>
            <span class="chip">Istio + Kiali</span>
            <span class="chip">Prometheus + Grafana</span>
            <span class="chip">cert-manager</span>
          </div>
        </section>

        <section class="grid">
          <article class="card span-7">
            <div class="title">Cluster DNA</div>
            <div class="kv">
              <div><div class="k">Platform</div><div class="v">Oracle Cloud (OCI) ARM</div></div>
              <div><div class="k">Architecture</div><div class="v">aarch64 / arm64</div></div>
              <div><div class="k">Host OS</div><div class="v">Oracle Linux 9.6</div></div>
              <div><div class="k">Kernel</div><div class="v">6.12.0 UEK</div></div>
              <div><div class="k">Ingress Layer</div><div class="v">NGINX Ingress Controller</div></div>
              <div><div class="k">Service Mesh</div><div class="v">Istio + Kiali</div></div>
              <div><div class="k">Delivery Model</div><div class="v">ArgoCD + ApplicationSets</div></div>
              <div><div class="k">Image Flow</div><div class="v">GitHub Actions → GHCR</div></div>
              <div><div class="k">TLS</div><div class="v">Let's Encrypt via cert-manager</div></div>
              <div><div class="k">Observability</div><div class="v">Prometheus + Grafana</div></div>
            </div>
          </article>

          <article class="card span-5">
            <div class="title">Traffic Journey</div>
            <ol class="flow">
              <li><span class="num">1</span>DNS points traffic to the ingress endpoint.</li>
              <li><span class="num">2</span>NGINX terminates TLS and routes by host/path.</li>
              <li><span class="num">3</span>Istio policies shape service-to-service flow.</li>
              <li><span class="num">4</span>App metrics are scraped and visualized.</li>
              <li><span class="num">5</span>ArgoCD continuously reconciles drift to Git.</li>
            </ol>
          </article>

          <article class="card span-12">
            <div class="title">Workloads & Tooling</div>
            <div class="app-columns">
              <section class="group">
                <h3>Product Apps</h3>
                <ul class="links">
                  <li><a href="https://momo.karamjitbrar.com" target="_blank" rel="noopener">Moment in Motion</a></li>
                </ul>
              </section>
              <section class="group">
                <h3>Cluster Tools</h3>
                <ul class="links">
                  <li><a href="https://argocd.karamjitbrar.com" target="_blank" rel="noopener">ArgoCD</a></li>
                  <li><a href="https://grafana.karamjitbrar.com" target="_blank" rel="noopener">Grafana</a></li>
                  <li><a href="https://kiali.karamjitbrar.com" target="_blank" rel="noopener">Kiali</a></li>
                  <li><a href="https://headlamp.karamjitbrar.com" target="_blank" rel="noopener">Headlamp</a></li>
                </ul>
              </section>
            </div>
          </article>

          <article class="card span-12">
            <div class="title">Operating Principles</div>
            <ul class="ops">
              <li>Git is the source of truth; manual cluster edits are temporary.</li>
              <li>Each app is declarative and continuously reconciled.</li>
              <li>Ingress + certificates are automated for secure defaults.</li>
              <li>Observability is built in, not added later.</li>
            </ul>
          </article>
        </section>

        <p class="footer">Built and operated by Karamjit Brar · Cloud-native learning in public</p>
      </main>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-deployment
  namespace: home
  labels:
    app: home
spec:
  replicas: 1
  selector:
    matchLabels:
      app: home
  template:
    metadata:
      labels:
        app: home
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
          readOnly: true
      volumes:
      - name: html
        configMap:
          name: home-page
---
apiVersion: v1
kind: Service
metadata:
  name: home-service
  namespace: home
spec:
  selector:
    app: home
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: home-ingress
  namespace: home
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: k8s.karamjitbrar.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: home-service
            port:
              number: 80
  tls:
  - secretName: k8s-tls
    hosts:
    - k8s.karamjitbrar.com