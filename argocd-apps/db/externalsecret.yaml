apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: momo-db-secrets
  namespace: db
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: momo-db-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: username
      remoteRef:
        key: momo-db-username
    - secretKey: password
      remoteRef:
        key: momo-db-password
