# ExternalSecret: kiali basic-auth ingress secret
# ------------------------------------------------------------------------------
# Kiali's ingress uses nginx basic auth via the secret 'kiali-basic-auth'.
# This ExternalSecret pulls those credentials from Bitwarden so they are
# never stored in Git.
#
# In Bitwarden Secrets Manager, create one secret in your project:
#   - Name: "kiali-basic-auth-htpasswd"
#     Value: htpasswd-format string, e.g. "admin:$apr1$..."
#     Generate with: htpasswd -nb admin yourpassword
#
# The k8s Secret must have key 'auth' for nginx basic auth to work.
# ------------------------------------------------------------------------------
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kiali-basic-auth
  namespace: kiali
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: kiali-basic-auth        # matches nginx annotation auth-secret in kiali.yaml
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: auth             # nginx basic auth requires key named 'auth'
      remoteRef:
        key: kiali-basic-auth-htpasswd
