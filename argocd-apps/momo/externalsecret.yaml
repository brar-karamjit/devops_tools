# ExternalSecret: momo app secrets
# ------------------------------------------------------------------------------
# Syncs secrets from Bitwarden Secrets Manager into the 'momo-secrets'
# Kubernetes Secret in the momo namespace.
#
# In Bitwarden Secrets Manager, create two secrets in your project:
#   - Name: "momo-django-secret-key"   → value: your Django secret key
#   - Name: "momo-gemini-api-key"      → value: your Gemini API key
#
# The secretKey values below must match what deployment.yaml reads:
#   - django-secret-key  (referenced by DJANGO_SECRET_KEY env var)
#   - gemini-api-key     (referenced by GEMINI_API_KEY env var)
#
# After ESO syncs this, the pod can start without any manual kubectl secret creation.
# If the namespace or cluster is rebuilt, Argo re-applies this manifest and ESO
# re-fetches the values from Bitwarden automatically.
# ------------------------------------------------------------------------------
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: momo-secrets
  namespace: momo
  annotations:
    # Ensure ESO processes this after the ClusterSecretStore is ready
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: momo-secrets          # matches secretKeyRef.name in deployment.yaml
    creationPolicy: Owner       # ESO owns this secret; deleted when ExternalSecret is deleted
    deletionPolicy: Retain      # keep the k8s secret if ExternalSecret is deleted (safety)
  data:
    - secretKey: django-secret-key    # key name inside the k8s Secret
      remoteRef:
        key: django-secret-key   # name of the secret in Bitwarden Secrets Manager
    - secretKey: gemini-api-key
      remoteRef:
        key: gemini-api-key
